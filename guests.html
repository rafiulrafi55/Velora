        id="guest-email"

    <script type="module">
      import { db } from "./assets/js/firebase-app.js";
      import {
        ref,
        onValue,
        push,
        remove,
        get,
        query,
        orderByChild,
        equalTo,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
      import { set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

      // --- Batch Import with Preview and Role Selection ---
      const importInput = document.getElementById("import-contacts");
      const batchImportModal = document.getElementById("batch-import-modal");
      const batchImportRole = document.getElementById("batch-import-role");
      const batchImportPreview = document.getElementById(
        "batch-import-preview",
      );
      const batchImportStatus = document.getElementById("batch-import-status");
      const batchImportConfirm = document.getElementById(
        "batch-import-confirm",
      );
      const batchImportCancel = document.getElementById("batch-import-cancel");
      let batchContacts = [];
      let batchSkippedCount = 0;

      function hasMultiplePhones(s) {
        if (!s) return false;
        const matches = s.match(/\+?\d[\d\s\-()]{6,}\d/g);
        return matches && matches.length > 1;
      }

      function extractFirstPhone(s) {
        if (!s) return "";
        const matches = s.match(/\+?\d[\d\s\-()]{6,}\d/g);
        const raw = matches && matches.length ? matches[0] : s;
        // normalize: remove spaces, dashes and parentheses, keep leading +
        const cleaned = raw.replace(/[^\d+]/g, "");
        return cleaned;
      }

      // Promise-based confirm dialog using the confirm modal
      function showConfirmDialog(
        message,
        okText = "OK",
        cancelText = "Cancel",
      ) {
        return new Promise((resolve) => {
          const modal = document.getElementById("confirm-modal");
          const msg = document.getElementById("confirm-modal-message");
          const okBtn = document.getElementById("confirm-modal-ok");
          const cancelBtn = document.getElementById("confirm-modal-cancel");
          if (!modal || !msg || !okBtn || !cancelBtn) {
            // fallback to native
            resolve(window.confirm(message));
            return;
          }
          // Ensure the modal is attached to body so it sits above other overlays
          try {
            if (modal.parentElement !== document.body)
              document.body.appendChild(modal);
          } catch (e) {
            // ignore
          }
          console.log("showConfirmDialog: opening confirm modal", message);
          msg.textContent = message;
          okBtn.textContent = okText;
          cancelBtn.textContent = cancelText;
          modal.classList.add("visible");
          const clean = () => {
            okBtn.removeEventListener("click", onOk);
            cancelBtn.removeEventListener("click", onCancel);
            modal.classList.remove("visible");
          };
          const onOk = () => {
            clean();
            resolve(true);
          };
          const onCancel = () => {
            clean();
            resolve(false);
          };
          okBtn.addEventListener("click", onOk);
          cancelBtn.addEventListener("click", onCancel);
        });
      }

      importInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        batchImportStatus.textContent = "";
        batchContacts = [];
        try {
          const text = await file.text();
          if (file.name.endsWith(".json")) {
            const data = JSON.parse(text);
            const arr = Array.isArray(data.contacts)
              ? data.contacts
              : Array.isArray(data)
                ? data
                : [];
            batchContacts = [];
            batchSkippedCount = 0;
            arr.forEach((c) => {
              let phone = c.phone || "";
              if (hasMultiplePhones(phone)) {
                phone = extractFirstPhone(phone);
              }
              batchContacts.push({
                name: c.name || "",
                email: c.email || "",
                phone,
                role: c.role || "Other",
              });
            });
          } else if (file.name.endsWith(".csv")) {
            const lines = text.split(/\r?\n/).filter(Boolean);
            const header = lines[0].split(",");
            const getCol = (colName) =>
              header.findIndex(
                (h) => h.trim().toLowerCase() === colName.toLowerCase(),
              );
            const firstNameIdx = getCol("First Name");
            const lastNameIdx = getCol("Last Name");
            const emailIdx = getCol("E-mail 1 - Value");
            const phoneIdx = getCol("Phone 1 - Value");
            batchContacts = [];
            batchSkippedCount = 0;
            for (let i = 1; i < lines.length; i++) {
              const cols = lines[i].split(",");
              const name = [cols[firstNameIdx], cols[lastNameIdx]]
                .filter(Boolean)
                .join(" ")
                .trim();
              const email =
                emailIdx !== -1 ? (cols[emailIdx] || "").trim() : "";
              let phone = phoneIdx !== -1 ? (cols[phoneIdx] || "").trim() : "";
              if (!name) continue;
              if (hasMultiplePhones(phone)) {
                phone = extractFirstPhone(phone);
              }
              batchContacts.push({
                name,
                email,
                phone,
                role: batchImportRole.value || "Other",
              });
            }
          } else if (file.name.endsWith(".csv")) {
            const lines = text.split(/\r?\n/).filter(Boolean);
            const header = lines[0].split(",");
            const getCol = (colName) =>
              header.findIndex(
                (h) => h.trim().toLowerCase() === colName.toLowerCase(),
              );
            const firstNameIdx = getCol("First Name");
            const lastNameIdx = getCol("Last Name");
            const emailIdx = getCol("E-mail 1 - Value");
            const phoneIdx = getCol("Phone 1 - Value");
            for (let i = 1; i < lines.length; i++) {
              const cols = lines[i].split(",");
              const name = [cols[firstNameIdx], cols[lastNameIdx]]
                .filter(Boolean)
                .join(" ")
                .trim();
              const email =
                emailIdx !== -1 ? (cols[emailIdx] || "").trim() : "";
              const phone =
                phoneIdx !== -1 ? (cols[phoneIdx] || "").trim() : "";
              if (name) {
                batchContacts.push({
                  name,
                  email,
                  phone,
                  role: batchImportRole.value || "Other",
                });
              }
            }
          }
          if (!batchContacts.length) {
            batchImportStatus.textContent = batchSkippedCount
              ? `No valid contacts found. Skipped ${batchSkippedCount} with multiple phone numbers.`
              : "No valid contacts found.";
            return;
          }
          renderBatchPreview();
          // Ensure batch modal is attached to body so it isn't hidden by the Add Guest modal
          try {
            if (
              batchImportModal &&
              batchImportModal.parentElement !== document.body
            ) {
              document.body.appendChild(batchImportModal);
            }
          } catch (err) {
            // ignore
          }
          batchImportModal.classList.add("visible");
          // Close the Add Guest modal since we're handling import separately
          const gm = document.getElementById("guest-modal-overlay");
          if (gm) {
            gm.classList.remove("visible");
            const gf = document.getElementById("guest-form");
            if (gf) gf.reset();
            gm.removeAttribute("data-edit-id");
          }
          // Render batch preview with remove buttons
          function renderBatchPreview() {
            batchImportPreview.innerHTML = `<table style='width:100%;border-collapse:collapse;font-size:14px;'>
                <thead><tr><th></th><th>Name</th><th>Email</th><th>Phone</th></tr></thead>
                <tbody>
                  ${batchContacts.map((c, i) => `<tr><td><button class='remove-batch-contact' data-idx='${i}' title='Remove' style='color:#fff;background:none;border:none;font-size:18px;line-height:1;padding:0 8px;cursor:pointer;'><span style='color:#e11d48;font-weight:bold;'>&#10006;</span></button></td><td>${c.name}</td><td>${c.email}</td><td>${c.phone}</td></tr>`).join("")}
                </tbody>
              </table>`;
            // Add event listeners for remove buttons
            batchImportPreview
              .querySelectorAll(".remove-batch-contact")
              .forEach((btn) => {
                btn.addEventListener("click", (e) => {
                  const idx = parseInt(btn.getAttribute("data-idx"));
                  batchContacts.splice(idx, 1);
                  renderBatchPreview();
                });
              });
          }
        } catch (err) {
          batchImportStatus.textContent = "Failed to parse file.";
        }
        importInput.value = "";
      });

      batchImportRole.addEventListener("change", () => {
        // Update role for all contacts in preview
        batchContacts = batchContacts.map((c) => ({
          ...c,
          role: batchImportRole.value,
        }));
        renderBatchPreview();
      });

      batchImportConfirm.addEventListener("click", async () => {
        if (!batchContacts.length) return;
        batchImportConfirm.disabled = true;

        // Close preview immediately
        try {
          batchImportModal.classList.remove("visible");
        } catch (e) {}

        const total = batchContacts.length;
        // create a loading overlay (circular progress) and append to body
        const loading = document.createElement("div");
        loading.className = "modal-overlay visible";
        loading.innerHTML = `
          <div class="modal-box" style="max-width:360px;text-align:center">
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px 0">
              <svg width="120" height="120" viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="48" stroke="#1f2937" stroke-width="8" fill="none"></circle>
                <circle id="batch-loading-circle" cx="60" cy="60" r="48" stroke="#f59e0b" stroke-width="8" fill="none" stroke-linecap="round" transform="rotate(-90 60 60)"></circle>
                <text id="batch-loading-percent" x="60" y="66" text-anchor="middle" font-size="18" fill="#ffffff">0%</text>
              </svg>
              <div style="font-size:14px;color:#d1d5db;margin:0" id="batch-loading-count">0/${total}</div>
              <div id="batch-loading-status" style="font-size:13px;color:#94a3b8"></div>
            </div>
          </div>
        `;
        document.body.appendChild(loading);

        // initialize circular progress stroke
        (function initCircular() {
          const prog = loading.querySelector("#batch-loading-circle");
          const pctText = loading.querySelector("#batch-loading-percent");
          const radius = 48;
          const circumference = 2 * Math.PI * radius;
          if (prog) {
            prog.style.transition = "stroke-dashoffset 180ms linear";
            prog.style.strokeDasharray = String(circumference);
            prog.style.strokeDashoffset = String(circumference);
            // expose for update in loop
            loading._circ = circumference;
            loading._prog = prog;
            loading._pctText = pctText;
          }
        })();

        let imported = 0,
          failed = 0;
        for (let i = 0; i < batchContacts.length; i++) {
          const contact = batchContacts[i];
          try {
            const payload = { ...contact };
            const hiddenField = document.getElementById("guest-event-id");
            const eventToAttach =
              hiddenField && hiddenField.value
                ? hiddenField.value
                : selectedEventId;
            if (eventToAttach) payload.eventId = eventToAttach;
            await push(ref(db, "guests"), payload);
            imported++;
          } catch (err) {
            failed++;
          }
          const counter = document.getElementById("batch-loading-count");
          if (counter) counter.textContent = `${i + 1}/${total}`;
          // update circular progress if present
          try {
            const circ = loading._circ;
            const prog = loading._prog;
            const pctText = loading._pctText;
            if (typeof circ !== "undefined" && prog) {
              const percent = (i + 1) / total;
              prog.style.strokeDashoffset = String(circ * (1 - percent));
              if (pctText)
                pctText.textContent = `${Math.round(percent * 100)}%`;
            }
          } catch (e) {}
        }

        try {
          loading.remove();
        } catch (e) {}
        batchContacts = [];
        batchImportStatus.textContent = `Imported ${imported} guest(s).${failed ? " Failed: " + failed : ""}`;
        batchImportConfirm.disabled = false;
      });

      batchImportCancel.addEventListener("click", () => {
        batchImportModal.classList.remove("visible");
        batchContacts = [];
        batchImportStatus.textContent = "";
      });

      const guestTableBody = document.getElementById("guest-table-body");
      const addGuestBtn = document.getElementById("add-guest-btn");
      const guestSearchInput = document.getElementById("guest-search");
      const eventsContainer = document.getElementById("events-container");
      const guestModal = document.getElementById("guest-modal-overlay");
      const guestForm = document.getElementById("guest-form");
      const cancelModalBtn = document.getElementById("cancel-modal-btn");
      const modalStatus = document.getElementById("modal-status");

      // Event tabs state
      let selectedEventId = null;
      let guestsCache = {};
      let eventsInitialized = false;
      let eventsCache = {};
      let guestSearchTerm = "";

      function debounce(fn, wait = 200) {
        let t = null;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn.apply(this, args), wait);
        };
      }

      function updateEventStats() {
        const statsEl = document.getElementById("event-stats");
        if (!statsEl) return;
        if (!selectedEventId) {
          statsEl.textContent = "";
          return;
        }
        const entries = guestsCache ? Object.entries(guestsCache) : [];
        const current = entries.filter(
          ([, g]) => (g && g.eventId) === selectedEventId,
        ).length;
        const expected =
          eventsCache && eventsCache[selectedEventId]
            ? eventsCache[selectedEventId].guestCount ||
              eventsCache[selectedEventId].guestCount === 0
              ? eventsCache[selectedEventId].guestCount
              : ""
            : "";
        statsEl.textContent =
          expected !== "" ? `${current}/${expected}` : `${current}`;
      }

      function renderEvents(events) {
        eventsContainer.innerHTML = "";
        if (!events) return;
        const entries = Object.entries(events);
        // On first load, default to the first event if nothing selected
        if (!eventsInitialized && entries.length && !selectedEventId) {
          selectedEventId = entries[0][0];
          const hidden = document.getElementById("guest-event-id");
          if (hidden) hidden.value = selectedEventId;
          eventsInitialized = true;
        }
        entries.forEach(([id, ev]) => {
          const btn = document.createElement("button");
          const current = guestsCache
            ? Object.values(guestsCache).filter((g) => g && g.eventId === id)
                .length
            : 0;
          const expected =
            eventsCache && eventsCache[id]
              ? eventsCache[id].guestCount || eventsCache[id].guestCount === 0
                ? eventsCache[id].guestCount
                : null
              : null;
          const isActive = selectedEventId === id;
          // use a small pill badge so current/expected can fit (e.g. "12/250")
          const badgeStyle = isActive
            ? "display:inline-flex;align-items:center;justify-content:center;margin-left:6px;border:1px solid #000000;color:#000000;border-radius:999px;padding:2px 6px;font-weight:700;font-size:11px;line-height:1;min-width:20px;"
            : "display:inline-flex;align-items:center;justify-content:center;margin-left:6px;border:1px solid #f59e0b;color:#f59e0b;border-radius:999px;padding:2px 6px;font-weight:700;font-size:11px;line-height:1;min-width:20px;";
          const badgeText =
            expected !== null ? `${current}/${expected}` : String(current);
          btn.innerHTML = `${ev.name || "Unnamed"} <span class="event-badge" style="${badgeStyle}">${badgeText}</span>`;
          btn.dataset.id = id;
          btn.style.cssText =
            "background:#1f2937;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;";
          if (selectedEventId === id) btn.style.background = "#f59e0b";
          btn.addEventListener("click", () => {
            selectedEventId = id;
            const hidden = document.getElementById("guest-event-id");
            if (hidden) hidden.value = id;
            renderEvents(events);
            renderGuests(guestsCache);
            updateEventStats();
          });
          eventsContainer.appendChild(btn);
        });
      }

      function renderGuests(guests) {
        guestTableBody.innerHTML = "";
        const entries = guests ? Object.entries(guests) : [];
        // Filter by selected event if present
        const filteredByEvent = selectedEventId
          ? entries.filter(([, g]) => (g && g.eventId) === selectedEventId)
          : entries;
        const filtered = guestSearchTerm
          ? filteredByEvent.filter(([, g]) => {
              const name = g && g.name ? String(g.name).toLowerCase() : "";
              const email = g && g.email ? String(g.email).toLowerCase() : "";
              const phone = g && g.phone ? String(g.phone).toLowerCase() : "";
              return (
                name.includes(guestSearchTerm) ||
                email.includes(guestSearchTerm) ||
                phone.includes(guestSearchTerm)
              );
            })
          : filteredByEvent;
        // Always show a message if no guests
        if (!filtered.length) {
          let msg = "No guests found.";
          if (
            selectedEventId &&
            eventsCache &&
            Object.keys(eventsCache).length === 0
          ) {
            msg = "No events found. Please create an event first.";
          } else if (selectedEventId) {
            msg = "No guests for this event.";
          }
          guestTableBody.innerHTML = `<tr class="empty-row"><td colspan="5">${msg}</td></tr>`;
          updateEventStats();
          return;
        }
        filtered.forEach(([id, guest]) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><button type="button" class="delete-guest-btn" data-id="${id}" title="Delete" style="color:#fff;background:none;border:none;font-size:18px;line-height:1;padding:0 8px;cursor:pointer;"><span style="color:#e11d48;font-weight:bold;">&#10006;</span></button></td>
            <td>${guest.name || ""}</td>
            <td>${guest.email || ""}</td>
            <td>${guest.phone || ""}</td>
            <td>${guest.role || ""}</td>
          `;
          // Add click event for editing (ignore delete button)
          tr.addEventListener("click", (e) => {
            if (e.target.closest(".delete-guest-btn")) return;
            guestForm.reset();
            modalStatus.textContent = "";
            guestModal.classList.add("visible");
            document.getElementById("guest-name").value = guest.name || "";
            document.getElementById("guest-email").value = guest.email || "";
            document.getElementById("guest-phone").value = guest.phone || "";
            document.getElementById("guest-role").value = guest.role || "Other";
            // ensure the hidden event id reflects this guest's event (or current selection)
            const hidden = document.getElementById("guest-event-id");
            if (hidden) hidden.value = guest.eventId || selectedEventId || "";
            guestModal.setAttribute("data-edit-id", id);
          });
          guestTableBody.appendChild(tr);
        });
        updateEventStats();
        // deletion handled via delegated listener on `guestTableBody`
      }

      // Delegated handler for delete buttons to avoid duplicate listeners
      if (guestTableBody && !guestTableBody.dataset.delegationAttached) {
        guestTableBody.dataset.delegationAttached = "1";
        guestTableBody.addEventListener("click", async (e) => {
          const btn = e.target.closest && e.target.closest(".delete-guest-btn");
          if (!btn) return;
          e.stopPropagation();
          const id = btn.getAttribute("data-id");
          if (!id) return;
          try {
            const ok = await showConfirmDialog(
              "Are you sure you want to delete this guest?",
              "Delete",
              "Cancel",
            );
            if (!ok) return;
            await remove(ref(db, `guests/${id}`));
          } catch (err) {
            console.error("Delete guest failed", err);
          }
        });
      }

      if (guestSearchInput) {
        guestSearchInput.addEventListener(
          "input",
          debounce((e) => {
            guestSearchTerm = (e.target.value || "").trim().toLowerCase();
            renderGuests(guestsCache);
          }, 220),
        );
      }

      // Listen for guest changes. Only render after events are initialized
      onValue(ref(db, "guests"), (snapshot) => {
        guestsCache = snapshot.val() || {};
        if (eventsInitialized) {
          renderGuests(guestsCache);
          updateEventStats();
          // refresh event badges
          try {
            renderEvents(eventsCache);
          } catch (e) {}
        }
      });

      // Listen for events and render tabs
      onValue(ref(db, "events"), (snap) => {
        const events = snap.val() || {};
        eventsCache = events;
        renderEvents(events);
        // After events are initialized, render guests (if any cached)
        if (eventsInitialized) {
          renderGuests(guestsCache);
          updateEventStats();
        }
      });

      // Show modal
      if (addGuestBtn && guestForm && modalStatus) {
        addGuestBtn.addEventListener("click", () => {
          // If no events exist, show popup and abort
          if (!eventsCache || Object.keys(eventsCache).length === 0) {
            alert("Create an event first");
            return;
          }
          try {
            guestForm.reset();
            modalStatus.textContent = "";
            if (guestModal) guestModal.classList.add("visible");
            // ensure hidden event id reflects current selection
            const hidden = document.getElementById("guest-event-id");
            if (hidden) hidden.value = selectedEventId || "";
            const nameEl = document.getElementById("guest-name");
            if (nameEl) nameEl.focus();
          } catch (err) {
            console.error("Error opening guest modal", err);
          }
        });
      } else {
        console.warn("Add guest UI elements missing", {
          addGuestBtn,
          guestForm,
          modalStatus,
        });
      }

      // Hide modal
      if (cancelModalBtn && guestModal) {
        cancelModalBtn.addEventListener("click", () => {
          try {
            guestModal.classList.remove("visible");
          } catch (err) {
            console.error("Error hiding guest modal", err);
          }
        });
        guestModal.addEventListener(
          "click",
          (e) => {
            // Only close if click is directly on the overlay, not on modal content or dropdown
            if (e.target === guestModal) {
              guestModal.classList.remove("visible");
            }
          },
          true,
        );
      }

      // Add guest submit
      guestForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        modalStatus.textContent = "";
        const name = document.getElementById("guest-name").value.trim();
        const email = document.getElementById("guest-email").value.trim();
        const phone = document.getElementById("guest-phone").value.trim();
        const role = document.getElementById("guest-role").value;
        if (!name) {
          modalStatus.textContent = "Name is required.";
          return;
        }
        const editId = guestModal.getAttribute("data-edit-id");
        try {
          if (editId) {
            // Update existing guest
            await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js").then(
              ({ ref, update }) =>
                update(ref(db, `guests/${editId}`), {
                  name,
                  email,
                  phone,
                  role,
                }),
            );
            guestModal.removeAttribute("data-edit-id");
          } else {
            // Add new guest
            // Build payload and attach event id from hidden field (fall back to selectedEventId)
            const payload = { name, email, phone, role };
            const hiddenField = document.getElementById("guest-event-id");
            const eventIdToAttach =
              hiddenField && hiddenField.value
                ? hiddenField.value
                : selectedEventId;
            if (eventIdToAttach) payload.eventId = eventIdToAttach;
            await push(ref(db, "guests"), payload);
          }
          guestModal.classList.remove("visible");
        } catch (err) {
          modalStatus.textContent =
            "Failed to save guest. Please check your internet connection or Firebase rules.";
        }
      });
      // Clear edit mode on modal close
      cancelModalBtn.addEventListener("click", () => {
        guestModal.removeAttribute("data-edit-id");
      });

      // Delete All behavior: delete only guests for selected event when an event is active
      const deleteAllBtn = document.getElementById("delete-all-guests-btn");
      if (deleteAllBtn) {
        // avoid attaching multiple listeners
        if (!deleteAllBtn.dataset.deleteListenerAttached) {
          deleteAllBtn.dataset.deleteListenerAttached = "1";
          deleteAllBtn.addEventListener("click", async (evt) => {
            evt.preventDefault();
            evt.stopPropagation();
            console.log("Delete All clicked", {
              selectedEventId,
              guestCount: Object.keys(guestsCache || {}).length,
            });
            if (deleteAllBtn.disabled) return;
            deleteAllBtn.disabled = true;
            let all = guestsCache || {};
            let ids = Object.entries(all)
              .filter(([, g]) =>
                selectedEventId ? (g && g.eventId) === selectedEventId : true,
              )
              .map(([id]) => id);
            // If cache is empty or not yet populated, fallback to querying the DB
            if (!ids.length) {
              try {
                if (selectedEventId) {
                  const q = query(
                    ref(db, "guests"),
                    orderByChild("eventId"),
                    equalTo(selectedEventId),
                  );
                  const snap = await get(q);
                  ids = [];
                  snap.forEach((s) => ids.push(s.key));
                } else {
                  const snap = await get(ref(db, "guests"));
                  ids = [];
                  snap.forEach((s) => ids.push(s.key));
                }
              } catch (err) {
                console.error("Failed to query guests for deletion", err);
              }
            }
            if (!ids.length) {
              deleteAllBtn.disabled = false;
              console.log("No guests to delete (after DB fallback).");
              return;
            }

            console.log("Found ids to delete", ids.length, ids.slice(0, 5));
            let confirmResult = false;
            try {
              confirmResult = await showConfirmDialog(
                selectedEventId
                  ? `Delete ${ids.length} guest(s) for the selected event?`
                  : `Delete all ${ids.length} guest(s)? This cannot be undone.`,
              );
              console.log("Confirm dialog result:", confirmResult);
              if (!confirmResult) {
                deleteAllBtn.disabled = false;
                return;
              }
            } catch (err) {
              console.error("Confirmation dialog failed", err);
              deleteAllBtn.disabled = false;
              return;
            }

            let deleted = 0;
            let failed = 0;
            try {
              for (const id of ids) {
                try {
                  await remove(ref(db, `guests/${id}`));
                  deleted++;
                } catch (err) {
                  failed++;
                  console.error("Failed to remove guest", id, err);
                }
              }
              console.log(
                `Deletion complete. deleted=${deleted}, failed=${failed}`,
              );
            } finally {
              deleteAllBtn.disabled = false;
            }
          });
        }
      }
    </script>
  </body>
</html>
